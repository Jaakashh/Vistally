<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Password — Vistally</title>
    <!-- Bootstrap & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <form id="update-password-form" class="auth-form">
            <div id="auth-message" class="mb-3"></div>
            <h2>Set New Password</h2>
            <p class=" text-center mb-4" style="font-size: .9rem;">Please enter and confirm your new password below.</p>
            <div class="form-group">
                <label for="password" class="form-label">New Password</label>
                <input type="password" class="form-control" id="password" required>
            </div>
            <div class="form-group">
                <label for="confirm-password" class="form-label">Confirm New Password</label>
                <input type="password" class="form-control" id="confirm-password" required>
            </div>
            <div class="form-group">
                <button type="submit" class="btn btn-amber w-100">Update Password</button>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://tppjsgqrcnmsocbthlbp.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRwcGpzZ3FyY25tc29jYnRobGJwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0NDgwMDgsImV4cCI6MjA5OTAyNDAwOH0.6Ay-cbnkBu4dMhAMGvpL1_35C6B41L6ypLsWxotnXJc";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const updatePasswordForm = document.getElementById('update-password-form');
        const messageDiv = document.getElementById('auth-message');

        updatePasswordForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (password !== confirmPassword) {
                messageDiv.innerHTML = `<div class="alert alert-danger">Passwords do not match.</div>`;
                return;
            }

            const { error } = await supabaseClient.auth.updateUser({ password: password });

            if (error) {
                messageDiv.innerHTML = `<div class="alert alert-danger">Error: ${error.message}</div>`;
            } else {
                messageDiv.innerHTML = `<div class="alert alert-success">Password updated successfully! Redirecting to login...</div>`;
                setTimeout(() => { window.location.href = 'Login.html'; }, 2000);
            }
        });
    </script>
</body>
</html>
